apiVersion: v1
kind: Namespace
metadata:
  name: mooncake-operator-system
  labels:
    control-plane: mooncake-operator
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mooncake-operator-controller-manager
  namespace: mooncake-operator-system
  labels:
    control-plane: mooncake-operator
spec:
  selector:
    matchLabels:
      control-plane: mooncake-operator
  replicas: 2
  template:
    metadata:
      labels:
        control-plane: mooncake-operator
    spec:
      serviceAccountName: mooncake-operator-controller-manager
      terminationGracePeriodSeconds: 10
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  control-plane: mooncake-operator
              topologyKey: kubernetes.io/hostname
      containers:
      - name: manager
        image: mooncake-operator:latest
        imagePullPolicy: IfNotPresent
        command:
        - /manager
        args:
        - --leader-elect
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          limits:
            cpu: 500m
            memory: 128Mi
          requests:
            cpu: 10m
            memory: 64Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
