apiVersion: mooncake.io/v1alpha1
kind: MooncakeCluster
metadata:
  name: demo
  namespace: default
spec:
  image: mooncake/mooncake-store:latest
  master:
    replicas: 1
    rpcPort: 50051
    metricsPort: 9003
    resources:
      requests:
        cpu: "2"
        memory: "4Gi"
      limits:
        cpu: "4"
        memory: "8Gi"
  workers:
    replicas: 2
    segmentSize: "4Gi"
    rdmaEnabled: true
    gpuEnabled: false
    resources:
      requests:
        cpu: "4"
        memory: "8Gi"
      limits:
        cpu: "8"
        memory: "16Gi"
  ha:
    type: k8s
  eviction:
    ratio: 0.05
    highWatermarkRatio: 0.95
