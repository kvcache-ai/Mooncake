apiVersion: mooncake.io/v1alpha1
kind: MooncakeCluster
metadata:
  name: demo
  namespace: default
spec:
  image: mooncake/mooncake-store:latest
  master:
    replicas: 1
    rpcPort: 50051
    metricsPort: 9003
    resources:
      requests:
        cpu: "1"
        memory: "1Gi"
      limits:
        cpu: "1"
        memory: "1Gi"
  workers:
    replicas: 2
    segmentSize: "4Gi"
    rdmaEnabled: false
    gpuEnabled: false
    resources:
      requests:
        cpu: "1"
        memory: "1Gi"
      limits:
        cpu: "1"
        memory: "1Gi"
  ha:
    type: k8s
  eviction:
    ratio: 0.05
    highWatermarkRatio: 0.95
