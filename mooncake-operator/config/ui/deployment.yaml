apiVersion: apps/v1
kind: Deployment
metadata:
  name: mooncake-operator-ui
  namespace: mooncake-operator-system
  labels:
    app.kubernetes.io/name: mooncake-operator-ui
    app.kubernetes.io/component: webui
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mooncake-operator-ui
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mooncake-operator-ui
        app.kubernetes.io/component: webui
    spec:
      serviceAccountName: mooncake-operator-ui
      terminationGracePeriodSeconds: 10
      containers:
      - name: ui
        image: mooncake-operator-ui:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3000
          name: http
        env:
        - name: PORT
          value: "3000"
        - name: NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        resources:
          limits:
            cpu: 500m
            memory: 256Mi
          requests:
            cpu: 100m
            memory: 64Mi
