name: 'Build & Test (Linux)'

on:
  push:
    branches:
      - "main"
      - "release/**"
  pull_request:
    branches:
      - "main"
      - "release/**"
    types: [opened, synchronize, reopened, labeled]
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  ci-stage:
    name: Determine CI stage
    runs-on: ubuntu-latest
    outputs:
      run-checks: ${{ steps.stage.outputs.run-checks }}
      run-full: ${{ steps.stage.outputs.run-full }}
    steps:
      - name: Select pre-review or full CI
        id: stage
        uses: actions/github-script@v7
        with:
          script: |
            const eventName = context.eventName;
            const action = context.payload.action;
            const isPushOrDispatch =
              eventName === 'push' || eventName === 'workflow_dispatch';
            const isPreReview =
              eventName === 'pull_request' &&
              ['opened', 'synchronize', 'reopened'].includes(action);
            const isFullReviewRun =
              eventName === 'pull_request' &&
              action === 'labeled' &&
              context.payload.label?.name === 'run-ci';

            core.setOutput(
              'run-checks',
              isPushOrDispatch || isPreReview || isFullReviewRun
            );
            core.setOutput('run-full', isPushOrDispatch || isFullReviewRun);

  build:
    needs: [ci-stage, spell-check, clang-format, check-paths]
    if: >-
      needs.ci-stage.outputs.run-full == 'true' &&
      (needs.check-paths.outputs.should-run-downstream == 'true' ||
       github.event_name == 'workflow_dispatch')
    uses: ./.github/workflows/core-build.yml
    with:
      collect-coverage: false
    secrets: inherit

  build-musa:
    needs: [ci-stage, spell-check, clang-format, check-paths]
    if: >-
      needs.ci-stage.outputs.run-full == 'true' &&
      (needs.check-paths.outputs.should-run-musa == 'true' ||
       github.event_name == 'push' ||
       github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-22.04
    container: registry.mthreads.com/mcconline/inference/pytorch:2.9.1.post1-py3.10-musa5.2.0-mp31-devel-ubuntu22.04-amd64
    steps:
    - uses: actions/checkout@v4
      with:
        persist-credentials: false

    - name: Mark repository as safe
      run: git config --global --add safe.directory $GITHUB_WORKSPACE
      shell: bash

    - name: Configure project
      run: |
        apt update -y
        apt install -y ninja-build
        bash -x dependencies.sh -y
        mkdir build
        cd build
        cmake -G Ninja .. -DUSE_MUSA=ON -DUSE_MNNVL=ON -DUSE_ETCD=ON -DSTORE_USE_ETCD=ON -DUSE_CXL=ON -DUSE_TCP=ON -DWITH_EP=ON -DBUILD_UNIT_TESTS=OFF -DBUILD_EXAMPLES=OFF -DENABLE_DEBUG_SYMBOLS=OFF
      shell: bash

    - name: Build project
      run: |
        cd build
        source ~/.bashrc
        cmake --build . --parallel 1
        cmake --install .
      shell: bash

  build-arm64:
    needs: [ci-stage, spell-check, clang-format, check-paths]
    if: >-
      needs.ci-stage.outputs.run-full == 'true' &&
      (needs.check-paths.outputs.should-run-arm64 == 'true' ||
       github.event_name == 'push' ||
       github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-22.04-arm
    strategy:
      matrix:
        # Full CI starts after code review approval, so validate both supported
        # Python ABIs before merge.
        python-version: ['3.10', '3.12']
    env:
      CI: "true"
      CU13_BUILD: "1"
      TORCH_CUDA_ARCH_LIST: "9.0"
      SCCACHE_GHA_ENABLED: "true"
      CUDA_HOME: "/usr/local/cuda"

    steps:
    - uses: actions/checkout@v4
      with:
        persist-credentials: false

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Free up disk space
      uses: ./.github/actions/free-disk-space

    - name: Install CUDA Toolkit 13.0 (arm64 SBSA)
      run: |
        wget https://developer.download.nvidia.com/compute/cuda/repos/ubuntu2204/sbsa/cuda-keyring_1.1-1_all.deb
        sudo dpkg -i cuda-keyring_1.1-1_all.deb
        sudo apt-get update
        sudo apt-get install -y cuda-toolkit-13-0
        echo "/usr/local/cuda/bin" >> $GITHUB_PATH
        /usr/local/cuda/bin/nvcc --version
      shell: bash

    - name: Run sccache-cache
      uses: mozilla-actions/sccache-action@v0.0.9

    - name: Configure sccache
      uses: actions/github-script@v7
      with:
        script: |
          core.exportVariable('ACTIONS_RESULTS_URL', process.env.ACTIONS_RESULTS_URL || '');
          core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

    - name: Configure project
      run: |
        sudo apt update -y
        sudo bash -x dependencies.sh -y
        mkdir build
        cd build
        cmake -G Ninja .. -DUSE_HTTP=ON -DUSE_CUDA=ON -DUSE_MNNVL=ON -DWITH_EP=OFF -DWITH_STORE_RUST=OFF -DENABLE_SCCACHE=ON -DCMAKE_BUILD_TYPE=Release
      shell: bash

    - name: Build project
      run: |
        export CUDA_HOME=/usr/local/cuda
        for dir in /usr/local/cuda/lib64/stubs /usr/local/cuda/targets/*/lib/stubs; do
          if [ -d "$dir" ]; then
            export LIBRARY_PATH="$dir:${LIBRARY_PATH:-}"
          fi
        done
        cd build
        cmake --build .
        sudo cmake --install .
      shell: bash

    - name: Run sccache stat for check
      if: ${{ env.SCCACHE_PATH != '' }}
      shell: bash
      run: ${SCCACHE_PATH} --show-stats

    - name: Generate Python version tag
      id: generate_tag_arm64
      run: |
        echo "python_version_tag=$(echo ${{ matrix.python-version }} | tr -d '.')" >> $GITHUB_OUTPUT
      shell: bash

    - name: Build Python wheel
      run: |
        PYTHON_VERSION=${{ matrix.python-version }} OUTPUT_DIR=dist-py${{ steps.generate_tag_arm64.outputs.python_version_tag }} ./scripts/build_wheel.sh
      shell: bash

    - name: Upload wheel artifact
      uses: actions/upload-artifact@v4
      with:
        name: wheel-arm64-cuda13-py${{ steps.generate_tag_arm64.outputs.python_version_tag }}
        path: mooncake-wheel/dist-py${{ steps.generate_tag_arm64.outputs.python_version_tag }}/*.whl

  test-wheel-ubuntu:
    needs: [ci-stage, spell-check, clang-format, build-flags]
    if: >-
      needs.ci-stage.outputs.run-full == 'true' &&
      needs.build-flags.result == 'success' &&
      (github.event_name == 'push' ||
       github.event_name == 'workflow_dispatch' ||
       github.event_name == 'pull_request')
    strategy:
      matrix:
        # Validate the complete OS x Python cross-product after approval.
        include:
          - ubuntu-version: ubuntu-22.04
            python-version: '3.10'
          - ubuntu-version: ubuntu-22.04
            python-version: '3.12'
          - ubuntu-version: ubuntu-24.04
            python-version: '3.10'
          - ubuntu-version: ubuntu-24.04
            python-version: '3.12'
    runs-on: ${{ matrix.ubuntu-version }}
    steps:
    - uses: actions/checkout@v4
      with:
        persist-credentials: false

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Generate Python version tag
      id: generate_tag_test
      run: |
        echo "python_version_tag=$(echo ${{ matrix.python-version }} | tr -d '.')" >> $GITHUB_OUTPUT
      shell: bash

    - name: Download wheel artifact
      uses: actions/download-artifact@v4
      with:
        name: mooncake-wheel-ubuntu-py${{ steps.generate_tag_test.outputs.python_version_tag }}
        path: mooncake-wheel/dist

    - name: Verify wheel file exists
      run: |
        ls -la mooncake-wheel/dist/
        if [ ! -f mooncake-wheel/dist/*.whl ]; then
          echo "ERROR: No wheel file found in mooncake-wheel/dist/"
          exit 1
        fi
      shell: bash

    - name: Free up disk space
      uses: ./.github/actions/free-disk-space

    - name: Install CUDA Toolkit
      uses: Jimver/cuda-toolkit@v0.2.24
      with:
        cuda: '12.8.1'
        linux-local-args: '["--toolkit"]'
        method: 'network'

    - name: Run installation test script
      run: |
        bash scripts/test_installation.sh
      shell: bash

    - name: Start metadata server
      run: |
        source test_env/bin/activate
        mooncake_http_metadata_server --port 8080 &
      shell: bash

    - name: Run tests with ssd
      run: |
        # Reserve port 50052 (mooncake_client RPC port) so the kernel never
        # auto-allocates it as ephemeral source port for other outbound
        # connections in the test suite. Without this, a random Python test
        # connection can pick src_port=50052, leave a TIME_WAIT on
        # <eth0_ip>:50052 for 60s, and block mooncake_client's bind to
        # 0.0.0.0:50052 even with SO_REUSEADDR (Linux only relaxes
        # TIME_WAIT+bind conflict for same-IP or loopback).
        sudo sysctl -w net.ipv4.ip_local_reserved_ports=50052
        source test_env/bin/activate
        MC_STORE_MEMCPY=false TEST_SSD_OFFLOAD_IN_EVICT=true ./scripts/run_tests.sh
        rm -rf /tmp/mooncake_test_ssd
        deactivate
      shell: bash

    - name: Start Mooncake Master
      run: |
        source test_env/bin/activate
        mkdir -p /tmp/mooncake_storage
        mooncake_master \
          --eviction_high_watermark_ratio=0.95 \
          --cluster_id=ci_test_cluster \
          --port 50051 &
        sleep 3
      shell: bash

    - name: Run Python Tensor API Performance Test (CI check)
      env:
        MOONCAKE_MASTER: "127.0.0.1:50051"
        MOONCAKE_TE_META_DATA_SERVER: "http://127.0.0.1:8080/metadata"
        MOONCAKE_PROTOCOL: "tcp"
        LOCAL_HOSTNAME: "127.0.0.1"
      run: |
        source test_env/bin/activate
        python scripts/test_tensor_api.py -n 1
      shell: bash

    - name: Run Python Async API Test (CI check)
      env:
        MOONCAKE_MASTER: "127.0.0.1:50051"
        MOONCAKE_TE_META_DATA_SERVER: "http://127.0.0.1:8080/metadata"
        MOONCAKE_PROTOCOL: "tcp"
        LOCAL_HOSTNAME: "127.0.0.1"
      run: |
        source test_env/bin/activate
        python scripts/test_async_store.py
      shell: bash

    - name: Test Mooncake Copy/Move API
      env:
        MOONCAKE_MASTER: "127.0.0.1:50051"
        MOONCAKE_TE_META_DATA_SERVER: "http://127.0.0.1:8080/metadata"
        MOONCAKE_PROTOCOL: "tcp"
        LOCAL_HOSTNAME: "127.0.0.1"
      run: |
        source test_env/bin/activate
        python scripts/test_copy_move_api.py
      shell: bash

    - name: Run Python Drain HTTP E2E Test (CI check)
      env:
        MOONCAKE_MASTER: "127.0.0.1:50051"
        MOONCAKE_TE_META_DATA_SERVER: "http://127.0.0.1:8080/metadata"
        MOONCAKE_PROTOCOL: "tcp"
        LOCAL_HOSTNAME: "127.0.0.1"
      run: |
        source test_env/bin/activate
        export LD_LIBRARY_PATH=$LD_LIBRARY_PATH:/usr/local/lib
        python scripts/test_drain_http_api.py --timeout-sec 90
      shell: bash

    - name: Run RPC Communicator Bandwidth Test
      run: |
        source test_env/bin/activate
        python mooncake-transfer-engine/tests/rpc_communicator_test.py server --url 127.0.0.1:9004 --data-size 1 &
        SERVER_PID=$!
        sleep 5
        timeout 10 python mooncake-transfer-engine/tests/rpc_communicator_test.py client --url 127.0.0.1:9004 --threads 2 --data-size 1 || true
        kill $SERVER_PID 2>/dev/null || true
        wait $SERVER_PID 2>/dev/null || true

    - name: Test Mooncake PyTorch Backend (CPU Only)
      env:
        MC_FORCE_TCP: "true"
      run: |
        source test_env/bin/activate
        python mooncake-pg/tests/test_pg_collectives.py
      shell: bash

    - name: Test Safetensor Functions
      run: |
        source test_env/bin/activate
        pip install safetensors
        python -m unittest mooncake-wheel.tests.test_safetensor_functions
      shell: bash

  build-flags:
    needs: [ci-stage, spell-check, clang-format, check-paths]
    if: >-
      needs.ci-stage.outputs.run-full == 'true' &&
      (needs.check-paths.outputs.should-run-downstream == 'true' ||
       github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        python-version: ['3.10', '3.12']
    env:
      CI: "true"
      BUILD_WITH_EP: "1"
      TORCH_CUDA_ARCH_LIST: "8.0;9.0"
      SCCACHE_GHA_ENABLED: "true"
      PIP_NO_CACHE_DIR: "1"
      MAX_JOBS: "2"
      EP_TORCH_VERSIONS: "2.11.0;2.12.0;2.12.1"
      CMAKE_RELWITHDEBINFO_FLAGS: "-O2 -DNDEBUG"

    steps:
    - uses: actions/checkout@v4
      with:
        persist-credentials: false

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Free up disk space
      uses: ./.github/actions/free-disk-space

    - name: Install CUDA Toolkit
      uses: Jimver/cuda-toolkit@v0.2.24
      with:
        cuda: '12.8.1'
        linux-local-args: '["--toolkit"]'
        method: 'network'
        sub-packages: '["nvcc", "nvrtc-dev"]'
        non-cuda-sub-packages: '["libcusparse-dev", "libcublas-dev", "libcusolver-dev"]'

    - name: Run sccache-cache
      uses: mozilla-actions/sccache-action@v0.0.9

    - name: Configure sccache
      uses: actions/github-script@v7
      with:
        script: |
          core.exportVariable('ACTIONS_RESULTS_URL', process.env.ACTIONS_RESULTS_URL || '');
          core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

    - name: Install dependencies
      run: |
        sudo apt update -y
        sudo apt install -y ninja-build
        sudo bash -x dependencies.sh -y
        df -h
      shell: bash

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Build transfer engine only
      run: |
        cd mooncake-transfer-engine
        mkdir build
        cd build
        export PATH=/usr/local/nvidia/bin:/usr/local/nvidia/lib64:$PATH
        export LD_LIBRARY_PATH=/usr/local/cuda/lib64/stubs:$LD_LIBRARY_PATH
        cmake -G Ninja .. \
          -DUSE_ETCD=OFF \
          -DUSE_CXL=ON \
          -DUSE_REDIS=ON \
          -DUSE_HTTP=ON \
          -DWITH_METRICS=ON \
          -DBUILD_UNIT_TESTS=ON \
          -DBUILD_EXAMPLES=ON \
          -DENABLE_SCCACHE=ON \
          -DUSE_CUDA=OFF \
          -DUSE_MNNVL=OFF \
          -DUSE_UB=OFF \
          -DCMAKE_EXE_LINKER_FLAGS="-L/usr/local/cuda/lib64/stubs" \
          "-DCMAKE_C_FLAGS_RELWITHDEBINFO=${CMAKE_RELWITHDEBINFO_FLAGS}" \
          "-DCMAKE_CXX_FLAGS_RELWITHDEBINFO=${CMAKE_RELWITHDEBINFO_FLAGS}" \
          -DENABLE_DEBUG_SYMBOLS=OFF
        cmake --build .
        sudo cmake --install .
        df -h
        cd ..
        rm -rf build
        df -h
      shell: bash

    - name: Configure project with all settings are ON
      run: |
        mkdir build
        cd build
        # ENABLE_DEBUG_SYMBOLS=OFF alone still leaves CMake's RelWithDebInfo -g.
        cmake -G Ninja .. \
          -DUSE_ETCD=ON \
          -DUSE_CXL=ON \
          -DUSE_REDIS=ON \
          -DUSE_HTTP=ON \
          -DWITH_STORE=ON \
          -DWITH_P2P_STORE=ON \
          -DWITH_METRICS=ON \
          -DBUILD_UNIT_TESTS=ON \
          -DBUILD_EXAMPLES=ON \
          -DENABLE_SCCACHE=ON \
          -DUSE_CUDA=ON \
          -DUSE_MNNVL=OFF \
          -DUSE_UB=OFF \
          -DCMAKE_EXE_LINKER_FLAGS="-L/usr/local/cuda/lib64/stubs" \
          "-DCMAKE_C_FLAGS_RELWITHDEBINFO=${CMAKE_RELWITHDEBINFO_FLAGS}" \
          "-DCMAKE_CXX_FLAGS_RELWITHDEBINFO=${CMAKE_RELWITHDEBINFO_FLAGS}" \
          -DENABLE_DEBUG_SYMBOLS=OFF
      shell: bash
      # TODO: lack USE_NVMEOF,USE_MNNVL

    - name: Build project with all settings are ON
      run: |
        export LD_LIBRARY_PATH=/usr/local/cuda/lib64/stubs:$LD_LIBRARY_PATH
        export LIBRARY_PATH=/usr/local/cuda/lib64/stubs:$LIBRARY_PATH
        cd build
        cmake --build .
        sudo cmake --install .
        df -h
      shell: bash

    - name: Configure project with unit tests and examples
      run: |
        cd build
        cmake -G Ninja .. -DBUILD_UNIT_TESTS=ON -DBUILD_EXAMPLES=ON -DWITH_STORE_RUST=ON -DENABLE_SCCACHE=ON -DENABLE_DEBUG_SYMBOLS=OFF
      shell: bash

    - name: Build project with unit tests and examples
      run: |
        export LD_LIBRARY_PATH=/usr/local/cuda/lib64/stubs:$LD_LIBRARY_PATH
        export LIBRARY_PATH=/usr/local/cuda/lib64/stubs:$LIBRARY_PATH
        cd build
        cmake --build .
        sudo cmake --install .
      shell: bash

    - name: Check Mooncake Store Rust bindings, examples, and tests
      run: |
        # libcuda.so.1 (SONAME of the CUDA stub) must be findable at runtime.
        # The toolkit stubs dir only ships libcuda.so; create the versioned symlink.
        if [ -f /usr/local/cuda/lib64/stubs/libcuda.so ] && \
           [ ! -e /usr/local/cuda/lib64/stubs/libcuda.so.1 ]; then
          sudo ln -s libcuda.so /usr/local/cuda/lib64/stubs/libcuda.so.1
        fi
        export LD_LIBRARY_PATH=/usr/local/cuda/lib64/stubs:$LD_LIBRARY_PATH
        cd mooncake-store/rust
        export MOONCAKE_BUILD_DIR=$GITHUB_WORKSPACE/build
        cargo test --lib
        MOONCAKE_STORE_LIB_DIR=$GITHUB_WORKSPACE/build/mooncake-store/src \
        MOONCAKE_STORE_INCLUDE_DIR=$GITHUB_WORKSPACE/mooncake-store/include \
          cargo test --examples --tests --no-run
        cargo clean
      shell: bash

    - name: Configure project
      run: |
        cd build
        rm -r */tests
        cmake -G Ninja .. \
          -DBUILD_UNIT_TESTS=OFF \
          -DBUILD_EXAMPLES=OFF \
          -DUSE_HTTP=ON \
          -DENABLE_SCCACHE=ON \
          -DUSE_CXL=ON \
          -DWITH_EP=ON \
          "-DEP_TORCH_VERSIONS=${EP_TORCH_VERSIONS}" \
          -DENABLE_DEBUG_SYMBOLS=OFF
      shell: bash

    - name: Build project
      run: |
        export LD_LIBRARY_PATH=/usr/local/cuda/lib64/stubs:$LD_LIBRARY_PATH
        export LIBRARY_PATH=/usr/local/cuda/lib64/stubs:$LIBRARY_PATH
        cd build
        cmake --build .
        sudo cmake --install .
      shell: bash

    - name: Build nvlink_allocator.so
      run: |
        mkdir -p build/mooncake-transfer-engine/nvlink-allocator
        cd mooncake-transfer-engine/nvlink-allocator
        export PATH=/usr/local/nvidia/bin:/usr/local/nvidia/lib64:$PATH
        export LD_LIBRARY_PATH=/usr/local/cuda/lib64/stubs:$LD_LIBRARY_PATH
        export LIBRARY_PATH=/usr/local/cuda/lib64/stubs:$LIBRARY_PATH
        bash build.sh ../../build/mooncake-transfer-engine/nvlink-allocator/
      shell: bash

    - name: Run sccache stat for check
      if: ${{ env.SCCACHE_PATH != '' }}
      shell: bash
      run: ${SCCACHE_PATH} --show-stats

    - name: Generate Python version tag
      id: generate_tag_flags
      run: |
        echo "python_version_tag=$(echo ${{ matrix.python-version }} | tr -d '.')" >> $GITHUB_OUTPUT
      shell: bash

    # In CI, build_wheel.sh removes build/ to free disk (CI=true); set FREE_BUILD_DIR=1 locally to enable.
    - name: Build Python wheel
      run: |
        PYTHON_VERSION=${{ matrix.python-version }} OUTPUT_DIR=dist-py${{ steps.generate_tag_flags.outputs.python_version_tag }} ./scripts/build_wheel.sh
      shell: bash

    - name: Upload Python wheel artifact
      uses: actions/upload-artifact@v4
      with:
        name: mooncake-wheel-ubuntu-py${{ steps.generate_tag_flags.outputs.python_version_tag }}
        path: mooncake-wheel/dist-py${{ steps.generate_tag_flags.outputs.python_version_tag }}/*.whl

  build-docker:
    name: Build Docker Image
    needs: [ci-stage, spell-check, clang-format, check-paths]
    if: >-
      needs.ci-stage.outputs.run-full == 'true' &&
      (needs.check-paths.outputs.should-run-docker == 'true' ||
       github.event_name == 'push' ||
       github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v4
      with:
        persist-credentials: false

    - name: Free up disk space
      uses: ./.github/actions/free-disk-space

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Build Docker image
      run: |
        docker build -f docker/mooncake.Dockerfile \
          --build-arg PYTHON_VERSION=3.10 \
          --build-arg EP_TORCH_VERSIONS="2.12.1" \
          --build-arg CLEAN_BUILD_ARTIFACTS=1 \
          -t mooncake:from-source .

  spell-check:
    name: Spell Check with Typos
    needs: [ci-stage]
    if: needs.ci-stage.outputs.run-checks == 'true'
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout Actions Repository
      uses: actions/checkout@v4
      with:
        persist-credentials: false
    - name: Spell Check Repo
      uses: crate-ci/typos@v1.30.2

  clang-format:
    name: Check code format
    needs: [ci-stage]
    if: needs.ci-stage.outputs.run-checks == 'true'
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout Actions Repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Need full history for branch comparison
        persist-credentials: false

    - name: Install clang-format 20
      run: |
        wget https://apt.llvm.org/llvm.sh
        chmod +x llvm.sh
        sudo ./llvm.sh 20
        sudo apt-get install -y clang-format-20

    - name: Check code format
      run: |
        # Check script exists and is executable
        if [[ ! -x ./scripts/code_format.sh ]]; then
          echo "Error: code_format.sh not found or not executable"
          exit 1
        fi

        # Determine base ref for comparison
        if [ "${{ github.event_name }}" == "pull_request" ]; then
          # For PRs: compare against the target branch
          BASE_REF="origin/${{ github.base_ref }}"
        else
          # For push events: use github.event.before to handle multi-commit pushes
          BEFORE_SHA="${{ github.event.before }}"
          if [ "${BEFORE_SHA}" == "0000000000000000000000000000000000000000" ]; then
            # New branch push, compare against default branch
            BASE_REF="origin/${{ github.event.repository.default_branch }}"
          else
            # Normal push (single or multiple commits)
            BASE_REF="${BEFORE_SHA}"
          fi
        fi
        echo "Comparing against: ${BASE_REF}"
        ./scripts/code_format.sh --check --base "${BASE_REF}"
      shell: bash

  fast-unit-tests:
    name: Fast Python and C++ unit tests
    needs: [ci-stage]
    if: needs.ci-stage.outputs.run-checks == 'true'
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v4
      with:
        persist-credentials: false

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install test dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libgtest-dev
        python -m pip install aiohttp pytest pyyaml

    - name: Run fast Python unit tests
      env:
        PYTHONPATH: mooncake-wheel
      run: |
        python scripts/test_hicache_hugepage_requirements.py
        python -m unittest \
          mooncake-wheel.tests.test_mooncake_config \
          mooncake-wheel.tests.test_http_metadata_server
        python -m pytest -q mooncake-wheel/tests/test_release_wheel_tags.py
      shell: bash

    - name: Build and run pre-review C++ unit tests
      run: |
        g++ -std=c++20 -O2 \
          -I mooncake-common/include \
          mooncake-common/src/environ.cpp \
          mooncake-common/tests/environ_test.cpp \
          -lgtest -pthread \
          -o "$RUNNER_TEMP/mooncake-environ-test"
        "$RUNNER_TEMP/mooncake-environ-test"
      shell: bash


  docs-check:
    name: Check Sphinx docs build
    needs: [ci-stage]
    if: needs.ci-stage.outputs.run-checks == 'true'
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 2
        persist-credentials: false

    - uses: dorny/paths-filter@v3
      id: filter
      with:
        filters: |
          docs:
            - 'docs/**'
            - 'docs/requirements-docs.txt'

    - name: Set up Python
      if: steps.filter.outputs.docs == 'true'
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install documentation dependencies
      if: steps.filter.outputs.docs == 'true'
      run: |
        python -m pip install --upgrade pip
        pip install -r docs/requirements-docs.txt

    - name: Build docs with strict mode
      if: steps.filter.outputs.docs == 'true'
      run: |
        cd docs
        make html SPHINXOPTS=-W
      shell: bash


  check-paths:
    needs: [ci-stage]
    if: needs.ci-stage.outputs.run-checks == 'true'
    runs-on: ubuntu-latest
    outputs:
      should-run-downstream: ${{ steps.dispatch-override.outputs.src || steps.filter.outputs.src }}
      should-run-tent: ${{ steps.dispatch-override.outputs.tent || steps.filter.outputs.tent }}
      should-run-docker: ${{ steps.dispatch-override.outputs.docker || steps.filter.outputs.docker }}
      should-run-arm64: ${{ steps.dispatch-override.outputs.arm64 || steps.filter.outputs.arm64 }}
      should-run-musa: ${{ steps.dispatch-override.outputs.musa || steps.filter.outputs.musa }}
      should-run-ascend: ${{ steps.dispatch-override.outputs.ascend || steps.filter.outputs.ascend }}
      should-run-efa: ${{ steps.dispatch-override.outputs.efa || steps.filter.outputs.efa }}
    steps:
      # workflow_dispatch has no PR/push diff context — skip paths-filter and default to true
      - name: Default to true for workflow_dispatch
        id: dispatch-override
        if: github.event_name == 'workflow_dispatch'
        run: |
          echo "src=true" >> $GITHUB_OUTPUT
          echo "tent=true" >> $GITHUB_OUTPUT
          echo "docker=true" >> $GITHUB_OUTPUT
          echo "arm64=true" >> $GITHUB_OUTPUT
          echo "musa=true" >> $GITHUB_OUTPUT
          echo "ascend=true" >> $GITHUB_OUTPUT
          echo "efa=true" >> $GITHUB_OUTPUT
      - uses: actions/checkout@v4
        if: github.event_name != 'workflow_dispatch'
        with:
          fetch-depth: 2
          persist-credentials: false
      - uses: dorny/paths-filter@v3
        if: github.event_name != 'workflow_dispatch'
        id: filter
        with:
          filters: |
            src:
              - 'mooncake-*/**'
              - 'extern/**'
              - 'CMakeLists.txt'
              - 'dependencies.sh'
              - 'scripts/**'
              - '.github/actions/**'
              - '.github/workflows/**'
            tent:
              - 'mooncake-transfer-engine/**'
              - 'mooncake-common/**'
              - 'CMakeLists.txt'
              - 'dependencies.sh'
              - '.github/actions/**'
              - '.github/workflows/ci.yml'
            docker:
              - 'docker/**'
              - '.dockerignore'
              - 'dependencies.sh'
              - 'CMakeLists.txt'
              - 'mooncake-wheel/**'
              - 'scripts/build_wheel.sh'
              - '.github/actions/**'
              - '.github/workflows/ci.yml'
            arm64:
              - 'mooncake-common/**/*.h'
              - 'mooncake-common/**/*.hpp'
              - 'mooncake-common/**/*.c'
              - 'mooncake-common/**/*.cc'
              - 'mooncake-common/**/*.cpp'
              - 'mooncake-integration/**/*.h'
              - 'mooncake-integration/**/*.hpp'
              - 'mooncake-integration/**/*.c'
              - 'mooncake-integration/**/*.cc'
              - 'mooncake-integration/**/*.cpp'
              - 'mooncake-store/**/*.h'
              - 'mooncake-store/**/*.hpp'
              - 'mooncake-store/**/*.c'
              - 'mooncake-store/**/*.cc'
              - 'mooncake-store/**/*.cpp'
              - 'mooncake-transfer-engine/**/*.h'
              - 'mooncake-transfer-engine/**/*.hpp'
              - 'mooncake-transfer-engine/**/*.c'
              - 'mooncake-transfer-engine/**/*.cc'
              - 'mooncake-transfer-engine/**/*.cpp'
              - '**/CMakeLists.txt'
              - 'dependencies.sh'
              - 'scripts/build_wheel.sh'
              - '.github/actions/**'
              - '.github/workflows/ci.yml'
            musa:
              - 'docker/musa.Dockerfile'
              - 'mooncake-common/**/*.h'
              - 'mooncake-common/**/*.hpp'
              - 'mooncake-common/**/*.cmake'
              - 'mooncake-ep/**'
              - 'mooncake-integration/**/*.h'
              - 'mooncake-integration/**/*.hpp'
              - 'mooncake-integration/**/*.cpp'
              - 'mooncake-pg/**'
              - 'mooncake-store/include/device/**'
              - 'mooncake-store/src/device/**'
              - 'mooncake-transfer-engine/include/gpu_vendor/**'
              - 'mooncake-transfer-engine/include/transport/device/**'
              - 'mooncake-transfer-engine/src/transport/device/**'
              - '**/CMakeLists.txt'
              - 'dependencies.sh'
              - 'scripts/build_wheel.sh'
              - '.github/actions/**'
              - '.github/workflows/ci.yml'
            ascend:
              - 'scripts/ascend/**'
              - 'mooncake-integration/allocator_ascend_npu.py'
              - 'mooncake-integration/CMakeLists.txt'
              - 'mooncake-store/include/device/**'
              - 'mooncake-store/src/device/**'
              - 'mooncake-transfer-engine/**/*ascend*'
              - 'mooncake-transfer-engine/include/transfer_engine*.h'
              - 'mooncake-transfer-engine/include/transport/transport.h'
              - 'mooncake-transfer-engine/src/transfer_engine*.cpp'
              - 'mooncake-transfer-engine/src/multi_transport.cpp'
              - 'mooncake-transfer-engine/src/transfer_metadata.cpp'
              - '**/CMakeLists.txt'
              - 'dependencies.sh'
              - '.github/actions/**'
              - '.github/workflows/ci.yml'
              - '.github/workflows/ci_ascend.yml'
            efa:
              - 'mooncake-common/**/*.h'
              - 'mooncake-common/**/*.hpp'
              - 'mooncake-integration/CMakeLists.txt'
              - 'mooncake-transfer-engine/**/*efa*'
              - 'mooncake-transfer-engine/include/transfer_engine*.h'
              - 'mooncake-transfer-engine/include/transport/transport.h'
              - 'mooncake-transfer-engine/src/transfer_engine*.cpp'
              - '**/CMakeLists.txt'
              - 'dependencies.sh'
              - 'scripts/build_wheel.sh'
              - '.github/actions/**'
              - '.github/workflows/ci.yml'
              - '.github/workflows/ci_efa.yml'
  build-wheel-cu13:
    needs: [ci-stage, spell-check, clang-format, check-paths]
    if: >-
      needs.ci-stage.outputs.run-full == 'true' &&
      (needs.check-paths.outputs.should-run-downstream == 'true' ||
       github.event_name == 'workflow_dispatch')
    uses: ./.github/workflows/ci_cu13.yml
    with:
      # Validate both supported Python ABIs after approval.
      python-versions: '["3.10", "3.12"]'
    secrets: inherit

  build-wheel-efa:
    needs: [ci-stage, spell-check, clang-format, check-paths]
    if: >-
      needs.ci-stage.outputs.run-full == 'true' &&
      (needs.check-paths.outputs.should-run-efa == 'true' ||
       github.event_name == 'push' ||
       github.event_name == 'workflow_dispatch')
    uses: ./.github/workflows/ci_efa.yml
    secrets: inherit

  ascend-test:
    # This reusable workflow checks out and builds the source independently.
    # Start it after the fast checks instead of waiting for core coverage.
    needs: [ci-stage, spell-check, clang-format, check-paths]
    if: >-
      needs.ci-stage.outputs.run-full == 'true' &&
      (needs.check-paths.outputs.should-run-ascend == 'true' ||
       github.event_name == 'push' ||
       github.event_name == 'workflow_dispatch')
    uses: ./.github/workflows/ci_ascend.yml
    secrets: inherit

  integration-test:
    # integration-test consumes the CUDA 13 Python 3.12 wheel artifact.
    needs: [ci-stage, build-wheel-cu13, check-paths]
    if: >-
      needs.ci-stage.outputs.run-full == 'true' &&
      needs.check-paths.outputs.should-run-downstream == 'true'
    uses: ./.github/workflows/integration-test.yml
    secrets: inherit

  tent-ci:
    needs: [ci-stage, spell-check, clang-format, check-paths]
    if: >-
      needs.ci-stage.outputs.run-full == 'true' &&
      (needs.check-paths.outputs.should-run-tent == 'true' ||
       github.event_name == 'push' ||
       github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        # Validate all TENT configurations after approval.
        name: ["cuda-on", "cuda-off", "cuda-off-metrics-on"]
    name: tent-ci (${{ matrix.name }})
    env:
      CI: "true"
      SCCACHE_GHA_ENABLED: "true"

    steps:
    - uses: actions/checkout@v4
      with:
        persist-credentials: false

    - name: Free up disk space
      if: matrix.name == 'cuda-on'
      uses: ./.github/actions/free-disk-space

    - name: Install CUDA Toolkit
      if: matrix.name == 'cuda-on'
      uses: Jimver/cuda-toolkit@v0.2.24
      with:
        cuda: '12.8.1'
        linux-local-args: '["--toolkit"]'
        method: 'network'
        sub-packages: '["nvcc", "nvrtc-dev"]'

    - name: Run sccache-cache
      uses: mozilla-actions/sccache-action@v0.0.9

    - name: Configure sccache
      uses: actions/github-script@v7
      with:
        script: |
          core.exportVariable('ACTIONS_RESULTS_URL', process.env.ACTIONS_RESULTS_URL || '');
          core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

    - name: Install dependencies
      run: |
        sudo apt update -y
        sudo apt install -y ninja-build
        sudo bash -x dependencies.sh -y
        df -h
      shell: bash

    - name: Configure project with TENT
      run: |
        mkdir build-tent
        cd build-tent
        CMAKE_FLAGS="-DUSE_CUDA=OFF"
        METRICS_FLAGS=""
        if [ "${{ matrix.name }}" = "cuda-on" ]; then
          CMAKE_FLAGS="-DUSE_CUDA=ON -DCMAKE_EXE_LINKER_FLAGS=-L/usr/local/cuda/lib64/stubs"
        elif [ "${{ matrix.name }}" = "cuda-off-metrics-on" ]; then
          METRICS_FLAGS="-DTENT_METRICS_ENABLED=ON"
        fi
        cmake -G Ninja .. -DUSE_TENT=ON -DUSE_HTTP=ON -DENABLE_SCCACHE=ON -DBUILD_UNIT_TESTS=ON -DBUILD_EXAMPLES=ON -DENABLE_DEBUG_SYMBOLS=OFF $CMAKE_FLAGS $METRICS_FLAGS
      shell: bash

    - name: Build project with TENT
      run: |
        if [ "${{ matrix.name }}" = "cuda-on" ]; then
          export LD_LIBRARY_PATH=/usr/local/cuda/lib64/stubs:$LD_LIBRARY_PATH
          export LIBRARY_PATH=/usr/local/cuda/lib64/stubs:$LIBRARY_PATH
        fi
        cd build-tent
        cmake --build .
        sudo cmake --install .
      shell: bash

    # Only run tests on the cuda-off leg. GitHub runners have no real GPU;
    # with USE_CUDA=ON tent's cuda_probe hits the CUDA stub library at
    # runtime and drives some dispatch paths past the fake objects the
    # unit tests rely on, causing false failures. cuda-on still validates
    # that every #ifdef USE_CUDA branch compiles.
    - name: Test (TENT)
      if: matrix.name != 'cuda-on'
      run: |
        cd build-tent
        ctest --test-dir mooncake-transfer-engine/tent/tests -j --output-on-failure
      shell: bash

    - name: Run sccache stat for check
      if: ${{ env.SCCACHE_PATH != '' }}
      shell: bash
      run: ${SCCACHE_PATH} --show-stats

  ci-gate:
    name: ${{ needs.ci-stage.outputs.run-full == 'true' && 'CI Gate' || 'Pre-review Gate' }}
    if: >-
      always() &&
      needs.ci-stage.outputs.run-checks == 'true'
    needs:
      - ci-stage
      - spell-check
      - clang-format
      - fast-unit-tests
      - docs-check
      - check-paths
      - build
      - build-musa
      - build-arm64
      - build-flags
      - build-docker
      - test-wheel-ubuntu
      - build-wheel-cu13
      - build-wheel-efa
      - tent-ci
      - ascend-test
      - integration-test
    runs-on: ubuntu-latest
    steps:
      - name: Check required job results
        run: |
          failing=$(echo "$NEEDS_JSON" | jq -r '
            to_entries[] |
            select(.value.result != "success" and .value.result != "skipped") |
            "\(.key): \(.value.result)"')
          if [ -n "$failing" ]; then
            echo "::error::The following jobs failed or were cancelled:"
            echo "$failing"
            exit 1
          fi
          echo "All checks passed or were acceptably skipped."
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
