name: Pre-Release

# Dry run of the release pipelines: build wheels through the same _build-wheel.yaml
# the Release / Release Non-CUDA / Release CUDA 13 workflows use, validate the
# artifacts, but do not create a GitHub Release or publish to PyPI.
#
# Trigger by pushing a pre-release tag, for example:
#   git tag v1.0.0-rc1 && git push origin v1.0.0-rc1
on:
  push:
    tags:
      - 'v*-rc*'
      - 'v*-alpha*'
      - 'v*-beta*'
      - 'v*-pre*'

jobs:
  build-cuda:
    uses: ./.github/workflows/_build-wheel.yaml
    with:
      runner: ubuntu-22.04
      container: pytorch/manylinux2_28-builder:cuda12.8
      cuda: container
      build-with-ep: '1'
      torch-cuda-arch-list: '8.0;9.0'
      ep-torch-versions: '2.11.0;2.12.0;2.12.1'
      build-nvlink-allocator: true
      cmake-args: >-
        -DBUILD_UNIT_TESTS=OFF -DUSE_HTTP=ON -DUSE_ETCD=ON -DUSE_CUDA=ON
        -DWITH_EP=ON -DSTORE_USE_ETCD=ON -DENABLE_SCCACHE=ON -DCMAKE_BUILD_TYPE=Release
      artifact-prefix: pre-release-cuda

  build-non-cuda:
    uses: ./.github/workflows/_build-wheel.yaml
    with:
      runner: ubuntu-22.04
      container: pytorch/manylinux2_28-builder:cuda12.8
      cuda: container
      build-with-ep: '0'
      variant-flag: NON_CUDA_BUILD
      cmake-args: >-
        -DUSE_HTTP=ON -DUSE_ETCD=ON -DUSE_CUDA=OFF -DWITH_EP=OFF
        -DSTORE_USE_ETCD=ON -DENABLE_SCCACHE=ON -DCMAKE_BUILD_TYPE=Release
      artifact-prefix: pre-release-non-cuda

  build-cuda13:
    uses: ./.github/workflows/_build-wheel.yaml
    with:
      runner: ubuntu-22.04
      container: pytorch/manylinux2_28-builder:cuda13.0
      cuda: container
      build-with-ep: '1'
      variant-flag: CU13_BUILD
      torch-cuda-arch-list: '8.0;9.0'
      ep-torch-versions: '2.11.0;2.12.0;2.12.1'
      build-nvlink-allocator: true
      cmake-args: >-
        -DBUILD_UNIT_TESTS=OFF -DUSE_HTTP=ON -DUSE_ETCD=ON -DUSE_CUDA=ON
        -DWITH_EP=ON -DSTORE_USE_ETCD=ON -DENABLE_SCCACHE=ON -DCMAKE_BUILD_TYPE=Release
      artifact-prefix: pre-release-cuda13

  build-cuda-arm64:
    uses: ./.github/workflows/_build-wheel.yaml
    with:
      runner: ubuntu-22.04-arm
      cuda: sbsa-12.8
      cmake-generator: Ninja
      torch-cuda-arch-list: '9.0'
      cmake-args: >-
        -DUSE_HTTP=ON -DUSE_CUDA=ON -DUSE_MNNVL=ON -DWITH_EP=OFF
        -DWITH_STORE_RUST=OFF -DENABLE_SCCACHE=ON -DCMAKE_BUILD_TYPE=Release
      artifact-prefix: pre-release-cuda-arm64

  build-cuda13-arm64:
    uses: ./.github/workflows/_build-wheel.yaml
    with:
      runner: ubuntu-22.04-arm
      cuda: sbsa-13.0
      cmake-generator: Ninja
      variant-flag: CU13_BUILD
      torch-cuda-arch-list: '9.0'
      cmake-args: >-
        -DUSE_HTTP=ON -DUSE_CUDA=ON -DUSE_MNNVL=ON -DWITH_EP=OFF
        -DWITH_STORE_RUST=OFF -DENABLE_SCCACHE=ON -DCMAKE_BUILD_TYPE=Release
      artifact-prefix: pre-release-cuda13-arm64

  validate-release:
    name: Validate release artifacts
    needs: [build-cuda, build-non-cuda, build-cuda13, build-cuda-arm64, build-cuda13-arm64]
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Download all pre-release wheel artifacts
        uses: actions/download-artifact@v4
        with:
          path: mooncake-wheel/dist-all
          pattern: pre-release-*

      - name: Prepare wheels for validation
        run: |
          mkdir -p mooncake-wheel/dist-release
          find mooncake-wheel/dist-all -name "*.whl" -exec cp {} mooncake-wheel/dist-release/ \;
          echo "Pre-release tag: ${GITHUB_REF_NAME}"
          echo "Collected wheels:"
          ls -la mooncake-wheel/dist-release/
          wheel_count=$(find mooncake-wheel/dist-release -name "*.whl" | wc -l)
          echo "wheel_count=${wheel_count}" >> "$GITHUB_ENV"
          if [ "${wheel_count}" -lt 20 ]; then
            echo "Expected at least 20 wheels (x86: 4 Python versions x 3 variants; arm64: 4 Python versions x 2 CUDA variants), found ${wheel_count}"
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Validate wheels with twine
        run: |
          pip install twine
          twine check mooncake-wheel/dist-release/*.whl

      - name: Upload validated wheels as workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pre-release-wheels-${{ github.ref_name }}
          path: mooncake-wheel/dist-release/*.whl
          retention-days: 14

      - name: Pre-release validation summary
        run: |
          echo "## Pre-Release validation passed" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Tag: \`${GITHUB_REF_NAME}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Wheels built: ${wheel_count}" >> "$GITHUB_STEP_SUMMARY"
          echo "- PyPI publish: skipped (pre-release dry run)" >> "$GITHUB_STEP_SUMMARY"
          echo "- GitHub Release upload: skipped (pre-release dry run)" >> "$GITHUB_STEP_SUMMARY"
