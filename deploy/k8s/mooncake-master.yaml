apiVersion: v1
kind: Namespace
metadata:
  name: mooncake
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: mooncake-master-config
  namespace: mooncake
data:
  master.yaml: |
    rpc_port: 50051
    rpc_thread_num: 4
    rpc_address: "0.0.0.0"
    rpc_conn_timeout_seconds: 0
    rpc_enable_tcp_no_delay: true

    enable_metric_reporting: true
    metrics_port: 9003

    enable_http_metadata_server: true
    http_metadata_server_host: "0.0.0.0"
    http_metadata_server_port: 8080

    default_kv_lease_ttl: 5000
    default_kv_soft_pin_ttl: 1800000
    allow_evict_soft_pinned_objects: true
    eviction_ratio: 0.05
    eviction_high_watermark_ratio: 0.95

    memory_allocator: "offset"
    allocation_strategy: "random"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mooncake-master
  namespace: mooncake
  labels:
    app.kubernetes.io/name: mooncake-master
    app.kubernetes.io/component: master
    app.kubernetes.io/part-of: mooncake
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mooncake-master
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mooncake-master
        app.kubernetes.io/component: master
        app.kubernetes.io/part-of: mooncake
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9003"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: mooncake-master
          image: ghcr.io/kvcache-ai/mooncake-master:latest
          command: ["mooncake_master"]
          args:
            - "--config_path=/etc/mooncake/master.yaml"
          ports:
            - name: rpc
              containerPort: 50051
              protocol: TCP
            - name: metrics
              containerPort: 9003
              protocol: TCP
            - name: metadata
              containerPort: 8080
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /metrics
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /metrics
              port: metrics
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests:
              cpu: "1"
              memory: "1Gi"
            limits:
              cpu: "4"
              memory: "4Gi"
          volumeMounts:
            - name: config
              mountPath: /etc/mooncake
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: mooncake-master-config
---
apiVersion: v1
kind: Service
metadata:
  name: mooncake-master
  namespace: mooncake
  labels:
    app.kubernetes.io/name: mooncake-master
    app.kubernetes.io/component: master
    app.kubernetes.io/part-of: mooncake
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: mooncake-master
  ports:
    - name: rpc
      port: 50051
      targetPort: rpc
      protocol: TCP
    - name: metadata
      port: 8080
      targetPort: metadata
      protocol: TCP
    - name: metrics
      port: 9003
      targetPort: metrics
      protocol: TCP
